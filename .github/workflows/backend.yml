name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: fleet_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm ci
    - name: Run Prisma Generate
      run: npx prisma generate
      env:
        DATABASE_URL: "postgresql://user:password@localhost:5432/fleet_db"
    - name: Run Tests
      run: npm test
      env:
        DATABASE_URL: "postgresql://user:password@localhost:5432/fleet_db"
        JWT_SECRET: "test_secret"
        PORT: 5000
    - name: Run Lint
      run: npm run lint
