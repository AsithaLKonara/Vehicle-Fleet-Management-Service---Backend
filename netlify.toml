[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist" # though Netlify doesn't really serve files from an Express API, it expects a publish directory

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true
